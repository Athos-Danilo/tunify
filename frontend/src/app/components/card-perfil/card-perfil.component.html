<article class="card-perfil">
      
  <div class="card-image-container">
    <img [src]="dadosDemograficos.foto_perfil" alt="Foto de perfil de {{ nomeUsuario }}" class="profile-photo">
  </div>

  <div class="card-info-container">
    <h2 class="profile-name">{{ nomeUsuario }}</h2>
    
    <span class="account-badge" [ngClass]="{'premium-badge': dadosDemograficos.tipo_conta.includes('PREMIUM')}">
      {{ dadosDemograficos.tipo_conta }}
    </span>
  </div>

  <hr class="card-separador" aria-hidden="true">

  <ul class="card-stats-container">
    
    <li class="stat-row">
      <div class="stat-icon" aria-hidden="true">
        <img [src]="modoEscuro ? '/icones/playlist-branco.webp' : '/icones/playlist-preto.webp'" alt=""> 
      </div>
      <span class="stat-text">{{ dadosDemograficos.total_playlists }} Playlists Públicas</span>
    </li>

    <li class="stat-row">
      <div class="stat-icon" aria-hidden="true">
        <img [src]="modoEscuro ? '/icones/seguidores-branco.webp' : '/icones/seguidores-preto.webp'" alt="">
      </div>
      <span class="stat-text">{{ dadosDemograficos.seguidores }} Seguidores</span>
    </li>

    <li class="stat-row">
      <div class="stat-icon" aria-hidden="true">
        <img [src]="modoEscuro ? '/icones/seguindo-branco.webp' : '/icones/seguindo-preto.webp'" alt="">
      </div>
      <span class="stat-text">{{ dadosDemograficos.seguindo }} Seguindo</span>
    </li>

  </ul>

</article>

<!-- ======================================================= -->
<!-- 🖥️ HEADER DESKTOP (SÓ APARECE EM TELAS GRANDES)         -->
<!-- ======================================================= -->
<header class="header-desktop-wrapper">
  <div class="cyber-glass-pill">
    
    <div class="header-logo">
      <app-logo tamanho="pequeno" [animado]="true"></app-logo>
    </div>

    <nav class="header-nav">
      <a routerLink="/dashboard" class="nav-item ativo">Início</a>
      <a routerLink="/playlists" class="nav-item">Playlists</a>
      <a routerLink="/radar" class="nav-item">Vibe Radar</a>
    </nav>

    <div class="header-actions">
      <!-- Barra de Pesquisa Animada -->
      <div class="search-container">
        <button class="btn-search-icon" aria-label="Abrir barra de pesquisa">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
        <input type="text" class="search-input" placeholder="O que você quer ouvir?">
        <button class="btn-submit-icon" aria-label="Pesquisar">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </button>
      </div>

      <!-- Toggle de Tema -->
      <button class="btn-tema-neon" [class.is-escuro]="modoEscuro" (click)="alternarTema()">
        <div class="track">
          <div class="knob">
            <svg *ngIf="modoEscuro" class="icone-lua" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            <svg *ngIf="!modoEscuro" class="icone-sol" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
          </div>
        </div>
      </button>

      <div class="divisor-vertical"></div>

      <!-- Dropdown de Perfil -->
      <div class="profile-dropdown-wrapper">
        <button class="perfil-mini" aria-haspopup="true">
          <img [src]="fotoPerfil" alt="" class="avatar-img">
          <span class="nome-txt">{{ primeiroNome }}</span>
          <svg class="icone-chevron" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </button>
        <div class="dropdown-menu">
          <a routerLink="/perfil" class="dropdown-item"><span class="material-icons">person</span> Meu Perfil</a>
          <a routerLink="/historico" class="dropdown-item"><span class="material-icons">history</span> Histórico Completo</a>
          <a routerLink="/configuracoes" class="dropdown-item"><span class="material-icons">settings</span> Configurações</a>
          <div class="dropdown-divisor"></div>
          <button class="dropdown-item btn-sair-dropdown" (click)="fazerLogout()">
            <svg class="icone-sair-svg" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg> Sair
          </button>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- ======================================================= -->
<!-- 📱 TOPO MOBILE (LOGO E PESQUISA)                        -->
<!-- ======================================================= -->
<!-- 🚨 Adicionamos a classe "search-aberta" baseada na variável -->
<header class="header-top-mobile" [class.compacta]="isScrolled" [class.search-aberta]="isSearchMobileOpen">
  
  <!-- A LOGO -->
  <div class="mobile-logo-mini">
    <app-logo tamanho="pequeno" [animado]="true"></app-logo>
  </div>

  <!-- 🚨 A NOVA BARRA DE PESQUISA MÁGICA (Nasce escondida) -->
  <div class="mobile-search-input-wrapper">
    <input type="text" class="mobile-input" placeholder="O que você quer ouvir?">
    <button class="btn-fechar-pesquisa" (click)="fecharPesquisaMobile()">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
  </div>

  <!-- OS BOTÕES (Lupa e Tema) -->
  <div class="mobile-top-actions">
    <!-- 🚨 A Lupa agora abre a pesquisa! -->
    <button class="btn-search-mobile" (click)="abrirPesquisaMobile()" aria-label="Pesquisar">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    </button>
    
    <button class="btn-tema-neon mini" [class.is-escuro]="modoEscuro" (click)="alternarTema()">
      <div class="track">
        <div class="knob">
          <svg *ngIf="modoEscuro" class="icone-lua" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
          <svg *ngIf="!modoEscuro" class="icone-sol" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        </div>
      </div>
    </button>
  </div>
</header>



<!-- ======================================================= -->
<!-- 📱 BOTTOM NAVIGATION (A NAVEGAÇÃO DE BAIXO)             -->
<!-- ======================================================= -->
<nav class="bottom-nav-mobile">
  <div class="nav-glass-container">
    <a routerLink="/dashboard" class="mobile-nav-item ativo">
      <span class="material-icons">home</span>
      <span>Início</span>
    </a>
    <a routerLink="/playlists" class="mobile-nav-item">
      <span class="material-icons">queue_music</span>
      <span>Playlists</span>
    </a>
    <a routerLink="/radar" class="mobile-nav-item">
      <span class="material-icons">radar</span>
      <span>Radar</span>
    </a>
    <a routerLink="/perfil" class="mobile-nav-item">
      <img [src]="fotoPerfil" alt="Perfil" class="mobile-avatar">
    </a>
  </div>
</nav>

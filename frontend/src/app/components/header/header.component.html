<header class="header-desktop-wrapper">
  
  <div class="cyber-glass-pill">
    
    <div class="header-logo">
      <app-logo tamanho="pequeno" [animado]="false"></app-logo>
    </div>

    <nav class="header-nav">
      <a routerLink="/dashboard" class="nav-item ativo">Início</a>
      <a routerLink="/playlists" class="nav-item">Playlists</a>
      <a routerLink="/radar" class="nav-item">Vibe Radar</a>
    </nav>

    <div class="header-actions">
      
        <button class="btn-tema-neon" [class.is-escuro]="modoEscuro" (click)="alternarTema()">
            <div class="track">
                <div class="knob">
                    <svg *ngIf="modoEscuro" class="icone-lua" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                    
                    <svg *ngIf="!modoEscuro" class="icone-sol" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </div>
            </div>
        </button>

      <div class="divisor-vertical"></div>

      <div class="perfil-mini">
        <img [src]="fotoPerfil" alt="Avatar" class="avatar-img">
        <span class="nome-txt">{{ primeiroNome }}</span>
      </div>

      <button class="action-btn sair-btn-minimal" (click)="fazerLogout()" title="Sair da Conta">
        
        <svg class="icone-sair-svg" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a9b3c4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display: block;">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        
        <span class="sair-txt">Sair</span>
        
      </button>

    </div>

  </div>
</header>

<section class="minutes-card" aria-labelledby="minutes-title">

  <!-- Agrupamos os textos na esquerda -->
  <div class="content-left" *ngIf="!mostrarVariacao" style="animation: fadeIn 0.3s ease-out forwards;">
    <p id="minutes-title" class="card-title">Total Mensal</p>

    <h2 class="minutes-value">
      {{ minutosAnimados | number:'1.0-0':'pt-BR' }}
      <span class="minutes-label">Minutos</span>
    </h2>
  </div>

  <!-- ✨ [NOVO] VISTA DA VARIAÇÃO PERCENTUAL COM O RAIO -->
  <div class="content-left variacao-container" *ngIf="mostrarVariacao" [ngClass]="variacao >= 0 ? 'positivo' : 'negativo'">
    <!-- SVG do Raio -->
    <svg class="raio-icon" viewBox="0 0 24 24" fill="currentColor" stroke="none">
      <!-- Polygon de um raio estético -->
      <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
    </svg>
    <div class="textos-variacao">
      <h2 class="variacao-value">
        {{ variacao > 0 ? '+' : '' }}{{ variacao | number:'1.1-1':'pt-BR' }}%
      </h2>
      <span class="variacao-label">que no mês passado</span>
    </div>
  </div>

  <!-- O botão fica isolado na direita -->
  <button class="arrow-btn" routerLink="/estatisticas" aria-label="Ver estatísticas detalhadas"
    title="Ver estatísticas detalhadas">

    <svg aria-hidden="true" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="5" y1="12" x2="19" y2="12"></line>
      <polyline points="12 5 19 12 12 19"></polyline>
    </svg>

  </button>

</section>

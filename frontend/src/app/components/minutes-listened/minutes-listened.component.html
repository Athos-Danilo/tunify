<div class="minutes-card">
  <div class="card-header">
    <span class="card-title">Tempo Ouvido:</span>
    
    <button class="arrow-btn" routerLink="/estatisticas" title="Ver estatísticas detalhadas">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"></line>
        <polyline points="12 5 19 12 12 19"></polyline>
      </svg>
    </button>
  </div>

  <div class="card-body">
    <h2 class="minutes-value">
      {{ totalMinutos | number:'1.0-0':'pt-BR' }} 
      <span class="minutes-label">Minutos</span>
    </h2>
  </div>
</div>
